services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      PORT: 4000
    depends_on:
      - mongo
      - redis
    ports:
      - "4000:4000"

  worker:
    build:
      context: ./worker
    env_file:
      - .env
    environment:
      PORT: 8001
    depends_on:
      - mongo
      - redis
    ports:
      - "8001:8001"

  frontend:
    build:
      context: ./frontend
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      PORT: 3000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  mongo_data:
