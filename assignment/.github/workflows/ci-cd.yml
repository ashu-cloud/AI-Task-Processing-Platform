name: ci-cd

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.1
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install worker dependencies
        working-directory: worker
        run: pip install -r requirements.txt

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Lint backend
        working-directory: backend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build Docker images
        run: |
          docker build -t ai-task-frontend:${{ github.sha }} ./frontend
          docker build -t ai-task-backend:${{ github.sha }} ./backend
          docker build -t ai-task-worker:${{ github.sha }} ./worker

  release-images:
    if: github.ref == 'refs/heads/main'
    needs: lint-and-build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout app repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push service images
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-frontend:${{ github.sha }} ./frontend
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-backend:${{ github.sha }} ./backend
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-worker:${{ github.sha }} ./worker
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-frontend:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-worker:${{ github.sha }}

      - name: Checkout infrastructure repository
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.INFRA_REPOSITORY }}
          token: ${{ secrets.INFRA_REPOSITORY_TOKEN }}
          path: infra

      - name: Update image tags in infra repository
        run: |
          sed -i "s|ai-task-frontend:.*|ai-task-frontend:${{ github.sha }}|g" infra/k8s/platform.yaml
          sed -i "s|ai-task-backend:.*|ai-task-backend:${{ github.sha }}|g" infra/k8s/platform.yaml
          sed -i "s|ai-task-worker:.*|ai-task-worker:${{ github.sha }}|g" infra/k8s/platform.yaml

      - name: Commit and push infra changes
        working-directory: infra
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add k8s/platform.yaml
          git commit -m "Deploy application images for ${{ github.sha }}" || exit 0
          git push
